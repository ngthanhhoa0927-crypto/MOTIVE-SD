services:
  back-end:
    build:
      context: ./backend
      dockerfile: dockerfile.be
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  front-end:
    build:
      context: ./frontend
      dockerfile: dockerfile.fe
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - back-end

volumes:
  postgres_data:
